# Render 무료 블루프린트: Node API + 정적 프런트(Vite dist)
# 대시보드: New → Blueprint → 이 저장소 연결 → 적용
# 주의: 무료 웹 디스크는 비영속이라 SQLite는 재시작 시 초기화될 수 있음(데모용).
#
# 배포 후 URL 예시(서비스 이름을 바꾸면 아래 VITE_API_BASE_URL도 같이 수정):
#   API:   https://crypto8-api.onrender.com
#   웹:   https://crypto8-web.onrender.com
# 정적 사이트(runtime: static)는 Blueprint에서 region을 지정할 수 없음(Render 제한).

services:
  - type: web
    name: crypto8-api
    runtime: node
    plan: free
    region: oregon
    # 기존에 커밋됐던 DB 잔여물·비영속 디스크 상 충돌 방지 후 마이그레이션
    buildCommand: rm -f server/data/crypto8.db prisma/server/data/crypto8.db 2>/dev/null; npm ci && npm run prisma:generate && npx prisma migrate deploy && npx prisma db seed
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: DATABASE_URL
        value: file:../server/data/crypto8.db
      # 운영용 Solana RPC는 별도 Provider 권장. Render Dashboard에서 값 입력 권장.
      # 예: https://mainnet.helius-rpc.com/?api-key=YOUR_API_KEY
      - key: SOLANA_RPC_URL
        sync: false
      - key: VITE_SOLANA_RPC_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: EXECUTION_MODE
        value: dry-run
      - key: LIVE_EXECUTION_CONFIRM
        value: "NO"
      - key: COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAME_SITE
        value: none

  - type: web
    name: crypto8-web
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: VITE_BASE_PATH
        value: /
      # API 서비스 이름(crypto8-api)과 맞춰야 브라우저에서 호출됩니다.
      - key: VITE_API_BASE_URL
        value: https://crypto8-api.onrender.com
      # Solana 잔고 조회를 public fallback보다 안정적으로 하려면 값 입력 권장
      - key: VITE_SOLANA_RPC_URL
        sync: false
