# GitHub 무료 Pages: 정적 프런트(dist) 배포
# 사용법:
# 1) GitHub 저장소 → Settings → Pages → Source: GitHub Actions
# 2) Settings → Secrets → Actions 에서 VITE_API_BASE_URL 추가 (예: https://crypto8-api.onrender.com)
# 3) Render 등에 API 배포 후 위 URL을 시크릿에 맞춤
# 4) main 푸시 또는 Actions 탭에서 "Deploy to GitHub Pages" 수동 실행

name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma client
        run: npm run prisma:generate

      - name: Build static site
        env:
          VITE_PHANTOM_APP_ID: ${{ secrets.VITE_PHANTOM_APP_ID }}
        run: |
          set -e
          API_URL="${{ secrets.VITE_API_BASE_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://crypto8-api.onrender.com"
            echo "::notice::VITE_API_BASE_URL 시크릿이 없어 기본값 $API_URL 로 빌드합니다. Render 서비스 이름을 바꿨다면 Secrets에 실제 API URL을 넣고 재실행하세요."
          fi
          export VITE_BASE_PATH="/${{ github.event.repository.name }}/"
          export VITE_API_BASE_URL="$API_URL"
          npm run build

      - name: SPA fallback (client-side routes refresh)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
